name: Publish docs via GitHub Pages
on:
  #pull_request: 
  #  branches:
  #    - main
  push:
    branches:
     - robolancer_updates
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - uses: actions/deploy-pages@v4
        with:
          python-version: 3.x
      - run: pip install -r requirements.txt
      #- run: mkdocs gh-deploy --force
